---
# .yamllint.yml
# This file tells yamllint which rules to enforce and which to relax.
# Place this file at the ROOT of your repository (same level as README.md).
# yamllint automatically picks it up when it runs in CI.

extends: default   # Start with yamllint's default rules, then override below

rules:

  # ── DISABLED RULES ─────────────────────────────────────────────────────────

  document-start: disable
  # Why disabled: yamllint wants every file to start with "---"
  # but Kubernetes YAML files commonly start directly with "apiVersion:"
  # Both are valid YAML. We disable this to avoid false positives.

  # ── RELAXED RULES ──────────────────────────────────────────────────────────

  indentation:
    spaces: 2                # Use 2-space indentation (Kubernetes standard)
    indent-sequences: false  # Don't enforce extra indentation for list items
    check-multi-line-strings: false

  empty-lines:
    max: 2          # Allow up to 2 blank lines between sections (was 0)
    max-start: 0    # No blank lines at the start of a file
    max-end: 1      # Allow 1 blank line at the end of a file (Windows editors add this)

  line-length:
    max: 150        # Allow longer lines (image URLs in K8s YAML can be long)
    level: warning  # Warn only, don't fail

  comments:
    min-spaces-from-content: 1   # Allow "# comment" with 1 space (was 2)

  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false
