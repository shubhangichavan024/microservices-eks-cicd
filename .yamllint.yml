---
# .yamllint.yml  — place at repo root (same level as README.md)
# Replaces the previous version. Two new fixes:
#   1. indent-sequences: whatever  → accepts lists indented OR not indented
#   2. new-line-at-end-of-file: disable → Windows editors often omit this

extends: default

rules:

  # ── Disabled completely ────────────────────────────────────────────────────
  document-start: disable
  # Reason: K8s YAML files normally start with "apiVersion:" not "---"

  new-line-at-end-of-file: disable
  # Reason: Windows editors (VS Code, Notepad++) often save files without
  # a trailing newline. This is cosmetic — it does not affect K8s behaviour.

  # ── Relaxed rules ─────────────────────────────────────────────────────────
  indentation:
    spaces: 2
    indent-sequences: whatever
    # "whatever" means: accept list dashes (-) whether they are indented or not.
    # Your cluster.yaml has the "-" indented 2 spaces under managedNodeGroups,
    # which is valid YAML. "false" expected it at column 0 — that was wrong.
    check-multi-line-strings: false

  empty-lines:
    max: 2          # Allow up to 2 blank lines between sections
    max-start: 0
    max-end: 1

  line-length:
    max: 150        # ECR image URLs are long
    level: warning  # Warn only, never fail

  comments:
    min-spaces-from-content: 1   # Allow "key: value  # comment" with 1 space

  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false