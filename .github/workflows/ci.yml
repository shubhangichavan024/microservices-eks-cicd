---
# .github/workflows/ci.yml
# CI Pipeline — Continuous Integration
# Runs on: every push to any branch, and every Pull Request
# Does:  Install deps → Run tests → Validate K8s YAML
# If any step fails the pipeline stops and you get a notification

name: CI — Test & Validate

on:
  push:
    branches: ['**']           # Triggers on push to EVERY branch
  pull_request:
    branches: [main, develop]  # Triggers when a PR targets main or develop

jobs:

  # ── JOB 1: Test User Service (Node.js) ──────────────────────────────────────
  test-user-service:
    name: Test User Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: user-service/package-lock.json

      - name: Install dependencies
        working-directory: user-service
        run: npm ci

      - name: Run unit tests
        working-directory: user-service
        run: npm test
        env:
          NODE_ENV: test


  # ── JOB 2: Test Product Service (Python) ────────────────────────────────────
  test-product-service:
    name: Test Product Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: product-service/requirements.txt

      - name: Install dependencies
        working-directory: product-service
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        working-directory: product-service
        run: pytest -v


  # ── JOB 3: Validate Kubernetes YAML Files ───────────────────────────────────
  validate-k8s-yaml:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        # yamllint automatically picks up .yamllint.yml from repo root
        # The -d flag is no longer needed since we have the config file
        run: yamllint k8s/

      - name: Install kubectl for dry-run validation
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install gettext (provides envsubst)
        run: sudo apt-get install -y gettext

      - name: Validate Kubernetes Manifests (Offline)
        run: |
          # 1. Setup local variables
          export ECR_REGISTRY="123456789012.dkr.ecr.us-east-1.amazonaws.com"
          export IMAGE_TAG="ci-dry-run-test"
          export NAMESPACE="default"
          
          # 2. Create a temporary output directory
          mkdir -p .processed-k8s
          
          # 3. Process the files with envsubst
          envsubst < k8s/user-service.yaml    > .processed-k8s/user-service.yaml
          envsubst < k8s/product-service.yaml > .processed-k8s/product-service.yaml
          envsubst < k8s/ingress.yaml         > .processed-k8s/ingress.yaml
          
          # 4. Run the offline schema validation tool
          curl -L -s https://github.com | tar xz
          ./kubeconform -summary -ignore-missing-schemas .processed-k8s/