# ─────────────────────────────────────────────────────────────────────────────
# CI PIPELINE — Continuous Integration
# Runs on: every push to any branch, and every Pull Request
# Does: Installs dependencies → Runs tests → Validates K8s YAML
# If any step fails the PR is BLOCKED from merging
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Test & Validate

on:
  push:
    branches: ['**']           # Triggers on push to EVERY branch
  pull_request:
    branches: [main, develop]  # Triggers when a PR targets main or develop

jobs:

  # ── JOB 1: Test User Service (Node.js) ──────────────────────────────────────
  test-user-service:
    name: Test User Service
    runs-on: ubuntu-latest     # GitHub provides a free Ubuntu VM to run this

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4      # Clone your GitHub repo into the VM

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'                               # Cache node_modules to speed up future runs
          cache-dependency-path: user-service/package-lock.json

      - name: Install dependencies
        working-directory: user-service
        run: npm ci                    # Clean install (faster + reproducible than npm install)

      - name: Run unit tests
        working-directory: user-service
        run: npm test
        env:
          NODE_ENV: test


  # ── JOB 2: Test Product Service (Python) ────────────────────────────────────
  test-product-service:
    name: Test Product Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: product-service/requirements.txt

      - name: Install dependencies
        working-directory: product-service
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        working-directory: product-service
        run: pytest -v                 # -v = verbose output (shows each test name)


  # ── JOB 3: Validate Kubernetes YAML Files ───────────────────────────────────
  validate-k8s-yaml:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 150}}}" k8s/

      - name: Dry-run kubectl apply (syntax check)
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          # Replace placeholders so kubectl can parse the files
          export ECR_REGISTRY="123456789012.dkr.ecr.us-east-1.amazonaws.com"
          export IMAGE_TAG="test-sha"
          export NAMESPACE="default"

          # Dry-run validates YAML structure without connecting to any cluster
          envsubst < k8s/user-service.yaml    | kubectl apply --dry-run=client -f -
          envsubst < k8s/product-service.yaml | kubectl apply --dry-run=client -f -
          envsubst < k8s/ingress.yaml         | kubectl apply --dry-run=client -f -
