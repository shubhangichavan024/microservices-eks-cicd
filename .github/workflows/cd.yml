# ─────────────────────────────────────────────────────────────────────────────
# CD PIPELINE — Continuous Deployment
# Runs on: push to `main` (production) or `develop` (staging)
# Does: Build Docker images → Push to ECR → Update EKS deployments → Verify
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID      — Your IAM user's access key
#   AWS_SECRET_ACCESS_KEY  — Your IAM user's secret key
#   AWS_ACCOUNT_ID         — Your 12-digit AWS account number
# ─────────────────────────────────────────────────────────────────────────────

name: CD — Build, Push & Deploy

on:
  push:
    branches:
      - main       # → deploys to PRODUCTION namespace
      - develop    # → deploys to STAGING namespace

env:
  AWS_REGION:        us-east-1
  EKS_CLUSTER_NAME:  microservices-cluster

jobs:

  # ── JOB 1: Build Docker Images & Push to Amazon ECR ─────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
      image-tag:    ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Authenticate GitHub Actions runner to AWS ──────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Log Docker into ECR so we can push images ─────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Enable Docker layer caching to make builds faster ─────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build + tag + push User Service image ─────────────────────────────
      - name: Build & Push — User Service
        uses: docker/build-push-action@v5
        with:
          context:    ./user-service
          push:       true
          # Tag with BOTH the git SHA (unique, permanent) and 'latest' (easy reference)
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/user-service:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/user-service:latest
          cache-from: type=gha               # Read cache from GitHub Actions cache
          cache-to:   type=gha,mode=max      # Write new layers to cache

      # ── Build + tag + push Product Service image ──────────────────────────
      - name: Build & Push — Product Service
        uses: docker/build-push-action@v5
        with:
          context:    ./product-service
          push:       true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/product-service:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/product-service:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Build + tag + push Frontend image ─────────────────────────────────
      # - name: Build & Push — Frontend
      #   uses: docker/build-push-action@v5
      #   with:
      #     context:    ./frontend
      #     push:       true
      #     tags: |
      #       ${{ steps.login-ecr.outputs.registry }}/frontend:${{ github.sha }}
      #       ${{ steps.login-ecr.outputs.registry }}/frontend:latest
      #     cache-from: type=gha
      #     cache-to:   type=gha,mode=max

      # ── Print a summary of what was pushed ────────────────────────────────
      - name: Print pushed images
        run: |
          echo "✅ Images pushed successfully:"
          echo "   user-service:${{ github.sha }}"
          echo "   product-service:${{ github.sha }}"
          echo "   frontend:${{ github.sha }}"


  # ── JOB 2: Deploy Updated Images to EKS ─────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push   # Only runs AFTER build-and-push succeeds

    # GitHub Environments let you add manual approval gates for production
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Connect kubectl to your EKS cluster ───────────────────────────────
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ env.EKS_CLUSTER_NAME }}

      # ── Decide which namespace based on branch ────────────────────────────
      # main → production  |  develop → staging
      - name: Set deployment namespace
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "NAMESPACE=production" >> $GITHUB_ENV
          else
            echo "NAMESPACE=staging" >> $GITHUB_ENV
          fi
          echo "ECR_REGISTRY=${{ needs.build-and-push.outputs.ecr-registry }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Print deploy target
        run: |
          echo "🚀 Deploying to namespace: $NAMESPACE"
          echo "   Image tag: $IMAGE_TAG"
          echo "   Branch: ${{ github.ref_name }}"

      # ── Create the namespace if it doesn't exist yet ──────────────────────
      - name: Create namespace (if not exists)
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      # ── Replace ${ECR_REGISTRY} and ${IMAGE_TAG} in YAML, then apply ──────
      - name: Deploy services to Kubernetes
        run: |
          envsubst < k8s/user-service.yaml    | kubectl apply -n $NAMESPACE -f -
          envsubst < k8s/product-service.yaml | kubectl apply -n $NAMESPACE -f -
          envsubst < k8s/ingress.yaml         | kubectl apply -n $NAMESPACE -f -

      # ── Wait for rolling update to finish ─────────────────────────────────
      # Kubernetes updates pods one by one (zero-downtime rolling update)
      - name: Wait for rollout to complete
        run: |
          echo "⏳ Waiting for user-service rollout..."
          kubectl rollout status deployment/user-service    -n $NAMESPACE --timeout=300s

          echo "⏳ Waiting for product-service rollout..."
          kubectl rollout status deployment/product-service -n $NAMESPACE --timeout=300s

          echo "⏳ Waiting for frontend rollout..."
          kubectl rollout status deployment/frontend        -n $NAMESPACE --timeout=300s

      # ── Print final state — always runs even if deploy failed ─────────────
      - name: Show deployment result
        if: always()
        run: |
          echo "═══════════════════════════════════"
          echo " Deployment Result — $NAMESPACE"
          echo "═══════════════════════════════════"
          echo ""
          echo "── Pods ──"
          kubectl get pods -n $NAMESPACE
          echo ""
          echo "── Services ──"
          kubectl get svc -n $NAMESPACE
          echo ""
          echo "── Ingress (Public URL) ──"
          kubectl get ingress -n $NAMESPACE

      # ── Rollback automatically if deploy failed ────────────────────────────
      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed — rolling back..."
          kubectl rollout undo deployment/user-service    -n $NAMESPACE
          kubectl rollout undo deployment/product-service -n $NAMESPACE
          kubectl rollout undo deployment/frontend        -n $NAMESPACE
          echo "↩️ Rollback complete"
